<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomize - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: '#3b82f6', // Tailwind blue-500
                        brandHover: '#2563eb', // Tailwind blue-600
                        darkBg: '#0f172a', // Slate-900 bg
                        cardBg: '#1e293b', // Slate-800 card
                        inputBg: '#0f172a', // Slate-900 input
                        textMuted: '#94a3b8', // Slate-400
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Spinner animation */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            width: 1.25rem;
            height: 1.25rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-darkBg min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Card Container -->
    <div class="w-full max-w-md bg-cardBg rounded-2xl shadow-2xl p-8 border border-slate-700">
        
        <!-- Logo Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 bg-gradient-to-br from-brand to-cyan-400 rounded-xl mb-4 flex items-center justify-center shadow-lg shadow-brand/20">
                <!-- Placeholder Atomize Icon -->
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Atomize</h1>
            <p class="text-sm text-textMuted mt-1">Sign in to your account</p>
        </div>

        <!-- Error Message Container (Hidden by default) -->
        <div id="error-message" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-sm text-center">
            Invalid credentials.
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5">
            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                        </svg>
                    </div>
                    <input id="email" type="email" required autocomplete="email" placeholder="name@company.com" 
                        class="block w-full pl-10 pr-3 py-2.5 bg-inputBg border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all sm:text-sm">
                </div>
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input id="password" type="password" required autocomplete="current-password" placeholder="••••••••" 
                        class="block w-full pl-10 pr-3 py-2.5 bg-inputBg border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all sm:text-sm">
                </div>
            </div>

            <!-- Action Area -->
            <div class="pt-2">
                <button id="submit-btn" type="submit" 
                    class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand hover:bg-brandHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-darkBg focus:ring-brand transition-colors disabled:opacity-70 disabled:cursor-not-allowed">
                    <span id="btn-text">Sign In</span>
                    <div id="loading-spinner" class="spinner hidden"></div>
                </button>
            </div>
        </form>
    </div>

    <!-- Initialization & Logic -->
    <script>
        // --- 1. CONFIGURATION ---
        // REPLACE THESE WITH YOUR ACTUAL SUPABASE URL AND ANON KEY
        const SUPABASE_URL = 'http://supabasekong-p74g1zief50q6k19s0ogr724.34.159.51.174.sslip.io';
        const SUPABASE_ANON_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3NjA4Mjc0MCwiZXhwIjo0OTMxNzU2MzQwLCJyb2xlIjoiYW5vbiJ9.JrHvFxlgg0DLAeXf--2wvgjfFyIwkRsoRof2pjgGbZ0';

        // --- 2. INITIALIZE SUPABASE ---
        // We use window.supabase since it's loaded via CDN
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 3. DOM ELEMENTS ---
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');

        // --- 4. LOGIN LOGIC ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Reset UI
            errorMessage.classList.add('hidden');
            btnText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                // Step A: Authenticate user using Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (authError) throw authError;

                const userId = authData.user.id;

                // Step B: Fetch the user's role from the custom 'users' table
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('role')
                    .eq('id', userId)
                    .single();

                if (userError) throw new Error('Could not fetch user role: ' + userError.message);
                if (!userData || !userData.role) throw new Error('User role not defined');

                // Step C: Redirect based on role
                const role = userData.role;
                if (role === 'super_admin') {
                    window.location.href = 'super-admin-dashboard.html';
                } else if (role === 'company_manager') {
                    window.location.href = 'manager-dashboard.html';
                } else if (role === 'sales_rep') {
                    window.location.href = 'sales-dashboard.html';
                } else {
                    throw new Error('Unknown role: ' + role);
                }

            } catch (error) {
                // Handle errors (Invalid login, network issues, etc.)
                let message = error.message;
                if (message === 'Invalid login credentials') {
                    message = 'Invalid email or password.';
                }
                
                errorMessage.textContent = message;
                errorMessage.classList.remove('hidden');
                
                // Restore UI Let user try again
                btnText.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
